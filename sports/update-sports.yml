name: Sports Data Updater

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-sports:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run sports data aggregation script
        env:
          CF_ACCOUNT_ID: 6e28c300aba6774b4357794886a90d38
          CF_KV_SPORTS_NAMESPACE_ID: ${{ secrets.CF_KV_SPORTS_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node sports/fetch-sports.js
