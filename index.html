<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Hit Metrics - Real-Time Internet Pulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #fafaf8;
            color: #111;
            font-family: 'Lora', Georgia, serif;
            padding: 36px 20px 60px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 960px;
        }

        /* ── MASTHEAD ── */
        .masthead {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid #111;
            padding-bottom: 10px;
            margin-bottom: 0;
        }

        .masthead-left {}

        .masthead-title {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            color: #111;
            letter-spacing: -0.5px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .masthead-tagline {
            font-family: 'Lora', serif;
            font-size: 12px;
            font-style: italic;
            color: #888;
            letter-spacing: 0.02em;
        }

        .masthead-right {
            text-align: right;
        }

        .masthead-dateline {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 11px;
            color: #999;
            line-height: 1.6;
        }

        .sync-countdown {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: #111;
            transition: color 0.2s ease;
        }

        /* ── SECTION HEADERS ── */
        .section-banner {
            background: none;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #999;
            padding: 14px 16px 6px;
            border-bottom: 0.5px solid #e0ddd5;
        }

        /* ── TABLE ── */
        .scoreboard {
            width: 100%;
            border-collapse: collapse;
            background-color: #fafaf8;
        }

        .scoreboard th {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #bbb;
            padding: 10px 16px;
            text-align: left;
            border-top: 0.5px solid #e0ddd5;
            border-bottom: 0.5px solid #e0ddd5;
        }

        .scoreboard td {
            padding: 14px 16px;
            border-bottom: 0.5px solid #e0ddd5;
            vertical-align: middle;
        }

        .scoreboard tbody tr:last-child td {
            border-bottom: 2px solid #111;
        }

        .scoreboard tbody tr:hover td {
            background-color: #f3f2ee;
        }

        /* ── ROW ELEMENTS ── */
        .rank-col {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            color: #ccc;
            width: 36px;
            text-align: center;
        }

        .entity-title {
            font-family: 'Lora', serif;
            font-size: 15px;
            font-weight: 600;
            color: #111;
            line-height: 1.3;
            margin-bottom: 3px;
        }

        .dispatch-link {
            color: #111;
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .dispatch-link:hover {
            color: #444;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .entity-summary {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 11px;
            color: #999;
            line-height: 1.5;
            margin-top: 2px;
        }

        .category-tag {
            display: inline-block;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #999;
            border-left: 2px solid #ddd;
            padding-left: 6px;
            margin-top: 5px;
        }

        .velocity-data {
            font-family: 'Lora', serif;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            text-align: right;
            white-space: nowrap;
        }

        .growth-indicator {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-align: right;
            white-space: nowrap;
        }

        /* ── FOOTER ── */
        .footer-note {
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 11px;
            color: #bbb;
            margin-top: 18px;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="masthead">
        <div class="masthead-left">
            <div class="masthead-title">Daily Hit Metrics</div>
            <div class="masthead-tagline">The internet's pulse, measured hourly</div>
        </div>
        <div class="masthead-right">
            <div class="masthead-dateline" id="live-clock">Syncing...</div>
            <div class="sync-countdown" id="countdown-clock">Next update: --:--</div>
        </div>
    </div>

    <table class="scoreboard">
        <thead>
            <tr>
                <th style="width: 5%">#</th>
                <th style="width: 57%">Trending topic</th>
                <th style="width: 14%">Circulation</th>
                <th style="width: 12%">Momentum</th>
            </tr>
        </thead>
        <tbody id="leaderboard-rows">
        </tbody>
    </table>

    <div class="footer-note">Sourced from open networks &amp; public indices · Updated hourly · dailyhitmetrics.com</div>

</div>

<script>
    let isPipelineRefreshing = false;
    let currentlyLoadedTimestamp = "";
    let pollingIntervalContainer = null;
    let pollingAttempts = 0;
    const MAX_POLL_ATTEMPTS = 10;

    const SECTION_LABELS = {
        'Social Pulse':     'Social Pulse',
        'Finance Trends':   'Finance Trends',
        'Popular Searches': 'Popular Searches'
    };

    function initCountdownClock() {
        setInterval(() => {
            if (isPipelineRefreshing) return;

            const now = new Date();
            const nextSync = new Date(
                now.getFullYear(), now.getMonth(), now.getDate(),
                now.getHours() + 1, 0, 0, 0
            );

            const diff = nextSync - now;
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            if (minutes === 0 && seconds === 0) {
                executeSmartPipelineSync();
                return;
            }

            const mm = String(minutes).padStart(2, '0');
            const ss = String(seconds).padStart(2, '0');
            document.getElementById('countdown-clock').innerText = `Next update: ${mm}:${ss}`;
        }, 1000);
    }

    function executeSmartPipelineSync() {
        isPipelineRefreshing = true;
        pollingAttempts = 0;
        const clock = document.getElementById('countdown-clock');
        clock.innerText = 'Updating...';
        clock.style.color = '#3a6a3a';

        pollingIntervalContainer = setInterval(async () => {
            pollingAttempts++;
            const updated = await loadDashboard(true);

            if (updated) {
                clearInterval(pollingIntervalContainer);
                isPipelineRefreshing = false;
                clock.style.color = '#111';
            } else if (pollingAttempts >= MAX_POLL_ATTEMPTS) {
                clearInterval(pollingIntervalContainer);
                isPipelineRefreshing = false;
                clock.style.color = '#111';
                clock.innerText = 'Update delayed — retrying next hour';
            }
        }, 30000);
    }

    async function loadDashboard(isPollingCheck = false) {
        try {
            const response = await fetch('data.json?t=' + Date.now());
            const data = await response.json();

            if (isPollingCheck && data.lastUpdated === currentlyLoadedTimestamp) {
                return false;
            }

            currentlyLoadedTimestamp = data.lastUpdated;

            const date = new Date(data.lastUpdated);
            const dateStr = date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('live-clock').innerText = `${dateStr} · ${timeStr}`;

            const tableBody = document.getElementById('leaderboard-rows');
            tableBody.innerHTML = '';

            let lastCategory = null;

            data.trafficLeaderboard.forEach(item => {
                if (item.category !== lastCategory) {
                    lastCategory = item.category;
                    const bannerRow = document.createElement('tr');
                    bannerRow.innerHTML = `<td colspan="4" class="section-banner">${SECTION_LABELS[item.category] || item.category}</td>`;
                    tableBody.appendChild(bannerRow);
                }

                const row = document.createElement('tr');
                const isNegative = item.growth.startsWith('-');
                const momentumColor = isNegative ? '#b03030' : '#2a6a2a';
                const arrow = isNegative ? '▼' : '▲';
                const targetUrl = item.url || '#';

                row.innerHTML = `
                    <td class="rank-col">${item.rank}</td>
                    <td>
                        <div class="entity-title">
                            <a href="${targetUrl}" target="_blank" rel="noopener noreferrer" class="dispatch-link">
                                ${item.site}
                            </a>
                        </div>
                        <div class="entity-summary">${item.trend}</div>
                        <div class="category-tag">${item.category}</div>
                    </td>
                    <td class="velocity-data">${item.dailyHits}</td>
                    <td class="growth-indicator" style="color: ${momentumColor};">${arrow} ${item.growth.replace(/^[+\-]/, '')}</td>
                `;
                tableBody.appendChild(row);
            });

            return true;
        } catch (error) {
            console.error('Dispatch error:', error);
            document.getElementById('live-clock').innerText = 'Connection error — retrying';
            return false;
        }
    }

    loadDashboard();
    initCountdownClock();
</script>

</body>
</html>
