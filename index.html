<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Hit Metrics - Real-Time Internet Pulse</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --accent-green: #238636;
            --neon-glow: #58a6ff;
            --ticker-green: #3fb950;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 950px;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #f0f6fc, #58a6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timestamp {
            font-size: 13px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .scoreboard {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        th {
            background-color: #21262d;
            color: var(--text-muted);
            text-align: left;
            padding: 14px 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #1f242c;
        }

        .rank-col {
            font-family: monospace;
            font-weight: bold;
            color: var(--text-muted);
            font-size: 16px;
            width: 40px;
        }

        .entity-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .entity-summary {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .badge {
            background-color: #21262d;
            border: 1px solid var(--border-color);
            color: var(--neon-glow);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
        }

        .velocity-data {
            font-family: monospace;
            font-size: 15px;
            font-weight: 600;
        }

        .growth-indicator {
            color: var(--ticker-green);
            font-family: monospace;
            font-size: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Daily Hit Metrics</h1>
        </div>
        <div class="timestamp" id="live-clock">Syncing pipeline...</div>
    </header>

    <table class="scoreboard">
        <thead>
            <tr>
                <th style="width: 5%">Rank</th>
                <th style="width: 55%">Trending Topic & Context</th>
                <th style="width: 15%">Classification</th>
                <th style="width: 13%">Velocity Index</th>
                <th style="width: 12%">Hourly Momentum</th>
            </tr>
        </thead>
        <tbody id="leaderboard-rows">
            <!-- Dynamic data drops here -->
        </tbody>
    </table>
</div>

<script>
    async function loadDashboard() {
        try {
            // Using a relative path makes the application 100% agnostic to branches or names!
            const response = await fetch('data.json');
            const data = await response.json();
            
            const localTime = new Date(data.lastUpdated).toLocaleString();
            document.getElementById('live-clock').innerText = `SYSTEM ACTIVE // REFRESHED: ${localTime}`;
            
            const tableBody = document.getElementById('leaderboard-rows');
            tableBody.innerHTML = ''; 

            data.trafficLeaderboard.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="rank-col">#${item.rank}</td>
                    <td>
                        <div class="entity-title">${item.site}</div>
                        <div class="entity-summary">${item.trend}</div>
                    </td>
                    <td><span class="badge">${item.category}</span></td>
                    <td class="velocity-data">${item.dailyHits}</td>
                    <td class="growth-indicator">${item.growth}</td>
                `;
                tableBody.appendChild(row);
            });
        } catch (error) {
            console.error('Dashboard synchronization error:', error);
            document.getElementById('live-clock').innerText = 'PIPELINE ERROR // OUT OF SYNC';
        }
    }

    loadDashboard();
</script>

</body>
</html>
