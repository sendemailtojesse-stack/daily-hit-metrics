<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Hit Metrics - The Internet's Record of Record</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #e8dfc8;
            color: #1a0f00;
            font-family: 'Libre Baskerville', Georgia, serif;
            padding: 36px 20px 60px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* ── MASTHEAD ── */
        .masthead {
            text-align: center;
            border-top: 5px solid #2c1810;
            border-bottom: 5px solid #2c1810;
            padding: 14px 0 10px;
            margin-bottom: 0;
            position: relative;
        }

        .masthead-eyebrow {
            font-size: 10px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #5a3e2b;
            font-family: 'Libre Baskerville', serif;
            margin-bottom: 4px;
        }

        .masthead-title {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 62px;
            color: #2c1810;
            line-height: 1;
            margin: 2px 0 4px;
        }

        .masthead-rule {
            border: none;
            border-top: 1px solid #2c1810;
            margin: 6px 60px;
        }

        .masthead-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 4px 0;
        }

        .masthead-dateline {
            font-family: 'IM Fell English', serif;
            font-size: 11px;
            color: #5a3e2b;
            font-style: italic;
        }

        .masthead-sync {
            text-align: right;
        }

        .sync-status {
            font-family: 'Libre Baskerville', serif;
            font-size: 10px;
            color: #5a3e2b;
            font-style: italic;
        }

        .sync-countdown {
            font-family: 'Libre Baskerville', serif;
            font-size: 10px;
            color: #2c1810;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-top: 2px;
            transition: color 0.2s ease;
        }

        /* ── SECTION HEADERS ── */
        .section-banner {
            background: #2c1810;
            color: #f5edd6;
            font-family: 'Libre Baskerville', serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            text-align: center;
            padding: 5px 0;
            margin: 0;
        }

        /* ── TABLE ── */
        .scoreboard {
            width: 100%;
            border-collapse: collapse;
            background-color: #f5edd6;
            border-left: 1px solid #2c1810;
            border-right: 1px solid #2c1810;
            border-bottom: 3px double #2c1810;
        }

        .scoreboard thead tr {
            background-color: #e8dfc8;
            border-bottom: 1px solid #b8a070;
        }

        .scoreboard th {
            font-family: 'Libre Baskerville', serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #5a3e2b;
            padding: 10px 14px;
            text-align: left;
            border-bottom: 2px solid #2c1810;
        }

        .scoreboard td {
            padding: 12px 14px;
            border-bottom: 1px dashed #b8a070;
            vertical-align: middle;
        }

        .scoreboard tbody tr:last-child td {
            border-bottom: none;
        }

        .scoreboard tbody tr:hover td {
            background-color: #ede4cc;
        }

        /* ── ROW ELEMENTS ── */
        .rank-col {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            color: #b8a070;
            width: 36px;
            text-align: center;
        }

        .entity-title {
            font-family: 'IM Fell English', serif;
            font-size: 15px;
            font-weight: 700;
            color: #1a0f00;
            line-height: 1.3;
            margin-bottom: 3px;
        }

        .dispatch-link {
            color: #1a0f00;
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .dispatch-link:hover {
            color: #6b2d0f;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .entity-summary {
            font-family: 'IM Fell English', serif;
            font-size: 12px;
            color: #5a3e2b;
            font-style: italic;
            line-height: 1.4;
        }

        .category-badge {
            display: inline-block;
            font-family: 'Libre Baskerville', serif;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #f5edd6;
            background: #2c1810;
            padding: 2px 6px;
            margin-top: 5px;
        }

        .velocity-data {
            font-family: 'Libre Baskerville', serif;
            font-size: 13px;
            font-weight: 700;
            color: #2c1810;
            text-align: right;
            white-space: nowrap;
        }

        .growth-indicator {
            font-family: 'Libre Baskerville', serif;
            font-size: 14px;
            font-weight: 700;
            text-align: right;
            white-space: nowrap;
        }

        /* ── FOOTER ── */
        .footer-rule {
            border: none;
            border-top: 3px double #2c1810;
            margin-top: 0;
        }

        .footer-note {
            text-align: center;
            font-family: 'IM Fell English', serif;
            font-size: 10px;
            font-style: italic;
            color: #8a6a50;
            margin-top: 12px;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="masthead">
        <div class="masthead-eyebrow">Est. 2026 &nbsp;✦&nbsp; The Internet's Record of Record</div>
        <div class="masthead-title">Daily Hit Metrics</div>
        <hr class="masthead-rule">
        <div class="masthead-bottom">
            <div class="masthead-dateline" id="live-clock">Syncing dispatches...</div>
            <div class="masthead-sync">
                <div class="sync-countdown" id="countdown-clock">Next dispatch: --:--</div>
            </div>
        </div>
    </div>

    <table class="scoreboard">
        <thead>
            <tr>
                <th style="width: 5%">No.</th>
                <th style="width: 57%">Dispatch & Context</th>
                <th style="width: 13%">Bureau</th>
                <th style="width: 13%">Circulation</th>
                <th style="width: 12%">Velocity</th>
            </tr>
        </thead>
        <tbody id="leaderboard-rows">
        </tbody>
    </table>

    <div class="footer-rule"></div>
    <div class="footer-note">All dispatches sourced from open networks &amp; public indices. Updated each hour on the hour. &nbsp;✦&nbsp; dailyhitmetrics.com</div>

</div>

<script>
    let isPipelineRefreshing = false;
    let currentlyLoadedTimestamp = "";
    let pollingIntervalContainer = null;
    let pollingAttempts = 0;
    const MAX_POLL_ATTEMPTS = 10;

    const SECTION_LABELS = {
        'Social Pulse':     '§ Social Pulse — Viral Dispatches from the Public Square',
        'Finance Trends':   '§ Finance Trends — Market Intelligence & Trading Sentiment',
        'Popular Searches': '§ Popular Searches — The Nation\'s Most Sought Queries'
    };

    function initCountdownClock() {
        setInterval(() => {
            if (isPipelineRefreshing) return;

            const now = new Date();
            const nextSync = new Date(
                now.getFullYear(), now.getMonth(), now.getDate(),
                now.getHours() + 1, 0, 0, 0
            );

            const diff = nextSync - now;
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            if (minutes === 0 && seconds === 0) {
                executeSmartPipelineSync();
                return;
            }

            const mm = String(minutes).padStart(2, '0');
            const ss = String(seconds).padStart(2, '0');
            document.getElementById('countdown-clock').innerText = `Next dispatch: ${mm}:${ss}`;
        }, 1000);
    }

    function executeSmartPipelineSync() {
        isPipelineRefreshing = true;
        pollingAttempts = 0;
        const clock = document.getElementById('countdown-clock');
        clock.innerText = 'Receiving dispatches...';
        clock.style.color = '#4a7a4a';

        pollingIntervalContainer = setInterval(async () => {
            pollingAttempts++;
            const updated = await loadDashboard(true);

            if (updated) {
                clearInterval(pollingIntervalContainer);
                isPipelineRefreshing = false;
                clock.style.color = '#2c1810';
            } else if (pollingAttempts >= MAX_POLL_ATTEMPTS) {
                clearInterval(pollingIntervalContainer);
                isPipelineRefreshing = false;
                clock.style.color = '#2c1810';
                clock.innerText = 'Dispatch delayed — retrying next hour';
            }
        }, 30000);
    }

    async function loadDashboard(isPollingCheck = false) {
        try {
            const response = await fetch('data.json?t=' + Date.now());
            const data = await response.json();

            if (isPollingCheck && data.lastUpdated === currentlyLoadedTimestamp) {
                return false;
            }

            currentlyLoadedTimestamp = data.lastUpdated;

            const date = new Date(data.lastUpdated);
            const dateStr = date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('live-clock').innerText = `${dateStr} · Dispatched at ${timeStr}`;

            const tableBody = document.getElementById('leaderboard-rows');
            tableBody.innerHTML = '';

            let lastCategory = null;

            data.trafficLeaderboard.forEach(item => {
                // Insert section banner when category changes
                if (item.category !== lastCategory) {
                    lastCategory = item.category;
                    const bannerRow = document.createElement('tr');
                    bannerRow.innerHTML = `<td colspan="5" class="section-banner">${SECTION_LABELS[item.category] || item.category}</td>`;
                    tableBody.appendChild(bannerRow);
                }

                const row = document.createElement('tr');

                const isNegative = item.growth.startsWith('-');
                const momentumColor = isNegative ? '#8a2a2a' : '#2a5a2a';
                const arrow = isNegative ? '▼' : '▲';
                const targetUrl = item.url || '#';

                row.innerHTML = `
                    <td class="rank-col">${toRoman(item.rank)}</td>
                    <td>
                        <div class="entity-title">
                            <a href="${targetUrl}" target="_blank" rel="noopener noreferrer" class="dispatch-link">
                                ${item.site}
                            </a>
                        </div>
                        <div class="entity-summary">${item.trend}</div>
                        <span class="category-badge">${item.category}</span>
                    </td>
                    <td class="velocity-data">${item.dailyHits}</td>
                    <td class="growth-indicator" style="color: ${momentumColor};">${arrow} ${item.growth.replace(/^[+\-]/, '')}</td>
                `;
                tableBody.appendChild(row);
            });

            return true;
        } catch (error) {
            console.error('Dispatch error:', error);
            document.getElementById('live-clock').innerText = 'Wire service disruption — dispatches delayed';
            return false;
        }
    }

    function toRoman(num) {
        const vals = [1000,900,500,400,100,90,50,40,10,9,5,4,1];
        const syms = ['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];
        let result = '';
        for (let i = 0; i < vals.length; i++) {
            while (num >= vals[i]) { result += syms[i]; num -= vals[i]; }
        }
        return result;
    }

    loadDashboard();
    initCountdownClock();
</script>

</body>
</html>
