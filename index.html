<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Internet Scoreboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; padding: 2rem; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        header { margin-bottom: 2rem; border-bottom: 1px solid #334155; padding-bottom: 1rem; }
        h1 { margin: 0; color: #38bdf8; }
        .timestamp { color: #94a3b8; font-size: 0.875rem; }
        .grid { display: grid; gap: 1rem; }
        .card { background: #1e293b; padding: 1.25rem; border-radius: 8px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .site-info { display: flex; flex-direction: column; }
        .site-name { font-weight: bold; font-size: 1.25rem; color: #f1f5f9; }
        .site-meta { color: #94a3b8; font-size: 0.875rem; margin-top: 0.25rem; }
        .stats { text-align: right; }
        .hits { font-size: 1.25rem; font-weight: bold; color: #34d399; }
        .growth { font-size: 0.875rem; margin-top: 0.25rem; }
        .positive { color: #34d399; }
        .negative { color: #f87171; }
        .trend-tag { font-size: 0.85rem; color: #cbd5e1; font-style: italic; margin-top: 0.5rem; background: #0f172a; padding: 0.25rem 0.5rem; border-radius: 4px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>The Internet Scoreboard</h1>
            <p class="timestamp">Live Daily Traffic & Core Informational Trends</p>
            <div id="update-time" class="timestamp"></div>
        </header>
        
        <main id="leaderboard" class="grid">
            </main>
    </div>

    <script>
        // Fetch and render the data
        async function loadScoreboard() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/sendemailtojesse-stack/daily-hit-metrics/refs/heads/main/data.json');
                const data = await response.json();
                
                // Format and display the last updated timestamp
                const date = new Date(data.lastUpdated);
                document.getElementById('update-time').innerText = `Last Updated: ${date.toLocaleString()}`;
                
                const container = document.getElementById('leaderboard');
                container.innerHTML = ''; // Clear loading state
                
                data.trafficLeaderboard.forEach(item => {
                    const isPositive = item.growth.startsWith('+');
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="site-info">
                            <span class="site-name">#${item.rank} ${item.site}</span>
                            <span class="site-meta">Category: ${item.category}</span>
                            <div><span class="trend-tag">Trending Topic: ${item.trend}</span></div>
                        </div>
                        <div class="stats">
                            <div class="hits">${item.dailyHits} hits/day</div>
                            <div class="growth ${isPositive ? 'positive' : 'negative'}">${item.growth} vs yesterday</div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Error parsing traffic data:", error);
                document.getElementById('leaderboard').innerHTML = `<p>Error loading real-time data.</p>`;
            }
        }

        // Run on page load
        loadScoreboard();
    </script>
</body>
</html>
