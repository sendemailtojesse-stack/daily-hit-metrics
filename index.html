<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Hit Metrics - Real-Time Internet Pulse</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --accent-green: #238636;
            --neon-glow: #58a6ff;
            --ticker-green: #3fb950;
            --ticker-red: #f85149;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 950px;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #f0f6fc, #58a6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-clocks {
            text-align: right;
        }

        .timestamp {
            font-size: 13px;
            color: var(--text-muted);
            font-family: monospace;
            line-height: 1.5;
        }

        .countdown {
            font-size: 12px;
            color: var(--neon-glow);
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin-top: 2px;
            transition: color 0.2s ease-in-out;
        }

        .scoreboard {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        th {
            background-color: #21262d;
            color: var(--text-muted);
            text-align: left;
            padding: 14px 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #1f242c;
        }

        .rank-col {
            font-family: monospace;
            font-weight: bold;
            color: var(--text-muted);
            font-size: 16px;
            width: 40px;
        }

        .entity-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .dashboard-link {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.15s ease-in-out;
        }

        .dashboard-link:hover {
            color: var(--neon-glow);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .entity-summary {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .badge {
            background-color: #21262d;
            border: 1px solid var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .velocity-data {
            font-family: monospace;
            font-size: 15px;
            font-weight: 600;
        }

        .growth-indicator {
            font-family: monospace;
            font-size: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Daily Hit Metrics</h1>
        </div>
        <div class="header-clocks">
            <div class="timestamp" id="live-clock">Syncing pipeline...</div>
            <div class="countdown" id="countdown-clock">NEXT PIPELINE SYNC: --:--</div>
        </div>
    </header>

    <table class="scoreboard">
        <thead>
            <tr>
                <th style="width: 5%">Rank</th>
                <th style="width: 55%">Trending Topic & Context</th>
                <th style="width: 15%">Classification</th>
                <th style="width: 13%">Velocity Index</th>
                <th style="width: 12%">Hourly Momentum</th>
            </tr>
        </thead>
        <tbody id="leaderboard-rows">
            </tbody>
    </table>
</div>

<script>
    // System Memory Flags
    let isPipelineRefreshing = false;
    let currentlyLoadedTimestamp = ""; 
    let pollingIntervalContainer = null;

    function initCountdownClock() {
        setInterval(() => {
            // Freeze calculations if the system is currently looping background checks
            if (isPipelineRefreshing) return;

            const now = new Date();
            
            // Calculate accurate distance to the top of the next hour
            const nextSync = new Date(
                now.getFullYear(),
                now.getMonth(),
                now.getDate(),
                now.getHours() + 1,
                0, 0, 0
            );
            
            const timeDifference = nextSync - now;
            const minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDifference % (1000 * 60)) / 1000);

            // 1. TOP OF THE HOUR TRIGGER CONDITION
            if (minutes === 0 && seconds === 0) {
                executeSmartPipelineSync();
                return;
            }

            const displayMinutes = String(minutes).padStart(2, '0');
            const displaySeconds = String(seconds).padStart(2, '0');
            document.getElementById('countdown-clock').innerText = `NEXT PIPELINE SYNC IN: ${displayMinutes}:${displaySeconds}`;
        }, 1000);
    }

    // 2. BACK-END POLLING ENGINE
    function executeSmartPipelineSync() {
        isPipelineRefreshing = true;
        const clockLabel = document.getElementById('countdown-clock');
        clockLabel.innerText = `SYNCHRONIZING WITH CLOUD PIPELINE...`;
        clockLabel.style.color = 'var(--ticker-green)';

        // Quietly check Cloudflare's directory assets every 30 seconds until the new file registers
        pollingIntervalContainer = setInterval(async () => {
            console.log("Checking cloud for raw database mutations...");
            const updateFound = await loadDashboard(true);
            
            if (updateFound) {
                // Clear the loop the exact second the new file arrives
                clearInterval(pollingIntervalContainer);
                isPipelineRefreshing = false;
                clockLabel.style.color = 'var(--neon-glow)';
                console.log("Smart sync complete. Terminal state refreshed.");
            }
        }, 30000);
    }

    async function loadDashboard(isPollingCheck = false) {
        try {
            const response = await fetch('data.json?t=' + Date.now());
            const data = await response.json();
            
            // If this is a background check, compare incoming data timestamps with screen state
            if (isPollingCheck && data.lastUpdated === currentlyLoadedTimestamp) {
                return false; // Timestamps match; Cloudflare hasn't finished deployment yet
            }

            // A newer database file has been confirmed! Lock in the state change
            currentlyLoadedTimestamp = data.lastUpdated;
            
            const localTime = new Date(data.lastUpdated).toLocaleString();
            document.getElementById('live-clock').innerText = `SYSTEM ACTIVE // REFRESHED: ${localTime}`;
            
            const tableBody = document.getElementById('leaderboard-rows');
            tableBody.innerHTML = ''; 

            data.trafficLeaderboard.forEach(item => {
                const row = document.createElement('tr');
                
                let badgeColor = '#bc8cff'; 
                let badgeBg = 'rgba(188, 140, 255, 0.1)';
                
                if (item.category === 'Finance Trends') {
                    badgeColor = 'var(--ticker-green)';
                    badgeBg = 'rgba(63, 185, 80, 0.1)';
                } else if (item.category === 'Popular Searches') {
                    badgeColor = 'var(--neon-glow)';
                    badgeBg = 'rgba(88, 166, 255, 0.1)';
                }

                const isNegative = item.growth.startsWith('-');
                const momentumColor = isNegative ? 'var(--ticker-red)' : 'var(--ticker-green)';
                const targetUrl = item.url || '#';

                row.innerHTML = `
                    <td class="rank-col">#${item.rank}</td>
                    <td>
                        <div class="entity-title">
                            <a href="${targetUrl}" target="_blank" rel="noopener noreferrer" class="dashboard-link">
                                ${item.site}
                            </a>
                        </div>
                        <div class="entity-summary">${item.trend}</div>
                    </td>
                    <td>
                        <span class="badge" style="color: ${badgeColor}; border-color: ${badgeColor}40; background-color: ${badgeBg};">
                            ${item.category}
                        </span>
                    </td>
                    <td class="velocity-data">${item.dailyHits}</td>
                    <td class="growth-indicator" style="color: ${momentumColor};">${item.growth}</td>
                `;
                tableBody.appendChild(row);
            });

            return true; // Return true to signal successful row mapping update
        } catch (error) {
            console.error('Dashboard synchronization error:', error);
            document.getElementById('live-clock').innerText = 'PIPELINE ERROR // OUT OF SYNC';
            return false;
        }
    }

    // Initialize layout
    loadDashboard();
    initCountdownClock();
</script>

</body>
</html>
