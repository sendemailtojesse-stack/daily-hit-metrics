<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Hit Metrics - The Internet's Record of Record</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #fdfaf5;
            color: #1a1a1a;
            font-family: 'Libre Baskerville', Georgia, serif;
            padding: 36px 20px 60px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 960px;
        }

        .masthead {
            text-align: center;
            padding-bottom: 10px;
            margin-bottom: 0;
        }

        .masthead-top-rule {
            border: none;
            border-top: 4px solid #1a1a1a;
            margin-bottom: 8px;
        }

        .masthead-eyebrow {
            font-family: 'Libre Baskerville', serif;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 6px;
        }

        .masthead-title {
            font-family: 'Playfair Display', serif;
            font-size: 68px;
            font-weight: 900;
            color: #1a1a1a;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .masthead-thin-rule {
            border: none;
            border-top: 1px solid #1a1a1a;
            margin: 0 0 6px;
        }

        .masthead-thick-rule {
            border: none;
            border-top: 4px solid #1a1a1a;
            margin: 6px 0 0;
        }

        .masthead-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 2px;
        }

        .masthead-dateline {
            font-family: 'Libre Baskerville', serif;
            font-size: 11px;
            color: #444;
            font-style: italic;
        }

        .masthead-tagline {
            font-family: 'Libre Baskerville', serif;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #444;
        }

        .sync-countdown {
            font-family: 'Libre Baskerville', serif;
            font-size: 11px;
            color: #1a1a1a;
            font-weight: 700;
            transition: color 0.2s ease;
        }

        .section-banner {
            background: #1a1a1a;
            color: #fdfaf5;
            font-family: 'Libre Baskerville', serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            text-align: center;
            padding: 5px 0;
        }

        .scoreboard {
            width: 100%;
            border-collapse: collapse;
            background-color: #fdfaf5;
            border-left: 1px solid #1a1a1a;
            border-right: 1px solid #1a1a1a;
        }

        .scoreboard th {
            font-family: 'Libre Baskerville', serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #666;
            padding: 10px 16px;
            text-align: left;
            background: #f0ebe0;
            border-top: 2px solid #1a1a1a;
            border-bottom: 2px solid #1a1a1a;
        }

        .scoreboard td {
            padding: 14px 16px;
            border-bottom: 1px solid #d4c9b0;
            vertical-align: middle;
        }

        .scoreboard tbody tr:last-child td {
            border-bottom: 3px double #1a1a1a;
        }

        .scoreboard tbody tr:hover td {
            background-color: #f5f0e6;
        }

        .rank-col {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: #c8b89a;
            width: 40px;
            text-align: center;
        }

        .entity-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .dispatch-link {
            color: #1a1a1a;
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .dispatch-link:hover {
            color: #5a2000;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .entity-summary {
            font-family: 'IM Fell English', serif;
            font-size: 12px;
            color: #666;
            font-style: italic;
            line-height: 1.4;
        }

        .category-badge {
            display: inline-block;
            font-family: 'Libre Baskerville', serif;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #fdfaf5;
            background: #1a1a1a;
            padding: 2px 7px;
            margin-top: 6px;
        }

        .velocity-data {
            font-family: 'Libre Baskerville', serif;
            font-size: 13px;
            font-weight: 700;
            color: #1a1a1a;
            text-align: right;
            white-space: nowrap;
        }

        .growth-indicator {
            font-family: 'Libre Baskerville', serif;
            font-size: 15px;
            font-weight: 700;
            text-align: right;
            white-space: nowrap;
        }

        .footer-note {
            text-align: center;
            font-family: 'IM Fell English', serif;
            font-size: 11px;
            font-style: italic;
            color: #888;
            margin-top: 16px;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="masthead">
        <div class="masthead-top-rule"></div>
        <div class="masthead-eyebrow">The Internet's Record of Record &nbsp;·&nbsp; Est. 2026</div>
        <div class="masthead-title">Daily Hit Metrics</div>
        <div class="masthead-thin-rule"></div>
        <div class="masthead-meta">
            <div class="masthead-dateline" id="live-clock">Syncing dispatches...</div>
            <div class="masthead-tagline">All the data fit to print</div>
            <div class="sync-countdown" id="countdown-clock">Next update: --:--</div>
        </div>
        <div class="masthead-thick-rule"></div>
    </div>

    <table class="scoreboard">
        <thead>
            <tr>
                <th style="width: 5%">No.</th>
                <th style="width: 55%">Trending Topic &amp; Context</th>
                <th style="width: 14%">Circulation</th>
                <th style="width: 13%">Momentum</th>
            </tr>
        </thead>
        <tbody id="leaderboard-rows">
        </tbody>
    </table>

    <div class="footer-note">All dispatches sourced from open networks &amp; public indices &nbsp;·&nbsp; Updated hourly on the hour &nbsp;·&nbsp; dailyhitmetrics.com</div>

</div>

<script>
    let isPipelineRefreshing = false;
    let currentlyLoadedTimestamp = "";
    let pollingIntervalContainer = null;
    let pollingAttempts = 0;
    const MAX_POLL_ATTEMPTS = 10;

    const SECTION_LABELS = {
        'Social Pulse':     'Social Pulse — Viral Dispatches from the Public Square',
        'Finance Trends':   'Finance Trends — Market Intelligence & Trading Sentiment',
        'Popular Searches': "Popular Searches — The Nation's Most Sought Queries"
    };

    function initCountdownClock() {
        setInterval(() => {
            if (isPipelineRefreshing) return;

            const now = new Date();
            const nextSync = new Date(
                now.getFullYear(), now.getMonth(), now.getDate(),
                now.getHours() + 1, 0, 0, 0
            );

            const diff = nextSync - now;
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            if (minutes === 0 && seconds === 0) {
                executeSmartPipelineSync();
                return;
            }

            const mm = String(minutes).padStart(2, '0');
            const ss = String(seconds).padStart(2, '0');
            document.getElementById('countdown-clock').innerText = `Next update: ${mm}:${ss}`;
        }, 1000);
    }

    function executeSmartPipelineSync() {
        isPipelineRefreshing = true;
        pollingAttempts = 0;
        const clock = document.getElementById('countdown-clock');
        clock.innerText = 'Receiving latest data...';
        clock.style.color = '#3a6a3a';

        pollingIntervalContainer = setInterval(async () => {
            pollingAttempts++;
            const updated = await loadDashboard(true);

            if (updated) {
                clearInterval(pollingIntervalContainer);
                isPipelineRefreshing = false;
                clock.style.color = '#1a1a1a';
            } else if (pollingAttempts >= MAX_POLL_ATTEMPTS) {
                clearInterval(pollingIntervalContainer);
                isPipelineRefreshing = false;
                clock.style.color = '#1a1a1a';
                clock.innerText = 'Update delayed — retrying next hour';
            }
        }, 30000);
    }

    async function loadDashboard(isPollingCheck = false) {
        try {
            const response = await fetch('data.json?t=' + Date.now());
            const data = await response.json();

            if (isPollingCheck && data.lastUpdated === currentlyLoadedTimestamp) {
                return false;
            }

            currentlyLoadedTimestamp = data.lastUpdated;

            const date = new Date(data.lastUpdated);
            const dateStr = date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('live-clock').innerText = `${dateStr} · ${timeStr}`;

            const tableBody = document.getElementById('leaderboard-rows');
            tableBody.innerHTML = '';

            let lastCategory = null;

            data.trafficLeaderboard.forEach(item => {
                if (item.category !== lastCategory) {
                    lastCategory = item.category;
                    const bannerRow = document.createElement('tr');
                    bannerRow.innerHTML = `<td colspan="4" class="section-banner">${SECTION_LABELS[item.category] || item.category}</td>`;
                    tableBody.appendChild(bannerRow);
                }

                const row = document.createElement('tr');
                const isNegative = item.growth.startsWith('-');
                const momentumColor = isNegative ? '#8a1a1a' : '#1a5a1a';
                const arrow = isNegative ? '▼' : '▲';
                const targetUrl = item.url || '#';

                row.innerHTML = `
                    <td class="rank-col">${item.rank}</td>
                    <td>
                        <div class="entity-title">
                            <a href="${targetUrl}" target="_blank" rel="noopener noreferrer" class="dispatch-link">
                                ${item.site}
                            </a>
                        </div>
                        <div class="entity-summary">${item.trend}</div>
                        <span class="category-badge">${item.category}</span>
                    </td>
                    <td class="velocity-data">${item.dailyHits}</td>
                    <td class="growth-indicator" style="color: ${momentumColor};">${arrow} ${item.growth.replace(/^[+\-]/, '')}</td>
                `;
                tableBody.appendChild(row);
            });

            return true;
        } catch (error) {
            console.error('Dispatch error:', error);
            document.getElementById('live-clock').innerText = 'Wire service disruption — dispatches delayed';
            return false;
        }
    }

    loadDashboard();
    initCountdownClock();
</script>

</body>
</html>
