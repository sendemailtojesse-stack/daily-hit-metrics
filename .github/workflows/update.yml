name: Daily Hit Metrics Updater

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run data aggregation script
        env:
          CF_ACCOUNT_ID: 6e28c300aba6774b4357794886a90d38
          CF_KV_NAMESPACE_ID: f214a5c040b64dbba5da9ad0dd58b88a
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node fetch-data.js
