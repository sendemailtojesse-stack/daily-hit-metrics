name: Daily Hit Metrics Updater

on:
  schedule:
    - cron: '0 * * * *' # Wakes up automatically every single hour on the dot
  workflow_dispatch: # Keeps your manual refresh button active

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Forces GitHub's helper tools to execute on Node 24

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run data aggregation script
        run: node fetch-data.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Automated data pipeline update" || echo "No changes to commit"
          git push

      - name: Force Cloudflare Deployment Sync
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/workers/builds/deploy_hooks/ae899479-de1d-4671-8505-da948da9cb15"
